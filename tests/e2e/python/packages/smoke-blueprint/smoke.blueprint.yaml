blueprint:
  schema: 1
  version: 0.1.0
  requires_reploy: ">=0.4.8.dev1"

app:
  id: smoke-app
  provider:
    type: python
    identifier: smoke-suite
    local_sources:
      smoke-suite: ../smoke-suite
      smoke-imap: ../smoke-imap
  terminal:
    color_env: SMOKE_COLOR

install:
  ports:
    deployed:
      https:
        host_bind: 127.0.0.1
        host_port: 19075
    staging:
      https:
        host_bind: 127.0.0.1
        host_port: 18075
  managed_paths:
    dirs:
      - path: conf
        update: preserve
        mount: /{{ path }}
      - path: data
        update: preserve
        mount: /{{ path }}
        writeable: true

bundle:
  options:
    imap:
      identifier: smoke-imap
      group: plugins
      description: Install the smoke IMAP plugin.

docker:
  deployment_dirs:
    config: conf
    bundle: .reploy/bundle
    data: data
  service:
    image: python:3.11-slim
  health:
    scheme_env: REPLOY_PUBLIC_SCHEME
    host_env: REPLOY_HOST_BIND
    port_env: REPLOY_HOST_PORT
    default_scheme: https
    default_host: 127.0.0.1
    default_port: "18075"
    path: /_health_
    tls_verify: false
  install:
    hooks:
      before_start:
        - app:
            - config
            - check
      after_start:
        - health_check:
            wait: true
        - app:
            - config
            - check
            - --live
    success:
      vars:
        server_url:
          server_url: true
      lines:
        - "server url: ${server_url}"
  default_command: serve
  command_defaults:
    container:
      argv_prefix:
        - smoke-server
  commands:
    serve:
      container:
        argv_suffix:
          - serve
    config_check:
      trigger:
        - config
        - check
      app_command: true
      deployed_command: true
      forward_flags:
        - --live
      container:
        argv_suffix:
          - config
          - check
