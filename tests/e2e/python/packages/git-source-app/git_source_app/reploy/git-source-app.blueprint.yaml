blueprint:
  schema: 1
  version: 0.1.0
  requires_reploy: ">=0.1.0"

environment:
  id: git-source-app
  components:
    application:
      type: python
      requirements: [git-source-app]
  executables:
    application:
      component: application
      binary: git-source-app
  commands:
    serve:
      executable: application
    config_check:
      executable: application
      trigger: [config, check]
      native_command: true
      deployed_command: true
      forward_flags: [--live]
      argv: [config, check]
  workload:
    command: serve
    endpoints:
      http:
        scheme: http
        port: 8080

docker:
  image: python:3.11-slim
  workload:
    endpoints:
      http:
        extends: environment.workload.endpoints.http
        bind:
          address: 0.0.0.0
        publish:
          address: 127.0.0.1
          staging: 18080
          deployed: 8080
