blueprint:
  schema: 1
  version: 0.1.0
  requires_reploy: ">=0.1.0"

app:
  id: git-source-app
  provider:
    type: python
    identifier: git-source-app

install:
  owner:
    user: "1000"
    group: "1000"
  ports:
    deployed:
      http:
        host_bind: 127.0.0.1
        host_port: 8080
    staging:
      http:
        host_bind: 127.0.0.1
        host_port: 18080

docker:
  deployment_dirs:
    config: conf
    bundle: .reploy/bundle
    data: data
  service:
    image: python:3.11-slim
  default_command: serve
  commands:
    serve:
      container:
        argv:
          - git-source-app
    config_check:
      trigger:
        - config
        - check
      app_command: true
      deployed_command: true
      forward_flags:
        - --live
      container:
        argv:
          - git-source-app
          - config
          - check
