blueprint:
  schema: 1
  version: 0.1.0
  requires_reploy: ">=0.5.1.dev1"

environment:
  id: omegaconf-inspector
  vars:
    project_root: ..
  translations:
    workspace:
      type: python
      scope: development
      root: "{{ project_root }}"
      mappings:
        omegaconf-inspector: .
  components:
    application:
      type: python
      requirements: [omegaconf-inspector]
  paths:
    config:
      container: /conf
      writable: true
      update: preserve
    data:
      container: /data
      writable: true
      update: preserve
  executables:
    inspector:
      component: application
      binary: omegaconf-inspector
  commands:
    serve:
      executable: inspector
      argv: [serve]
    config_init:
      executable: inspector
      trigger: [config, init]
      native_command: true
      forward_flags: [--force]
      argv: [config, init]
    config_check:
      executable: inspector
      trigger: [config, check]
      native_command: true
      deployed_command: true
      forward_flags: [--live]
      argv: [config, check]
    config_show:
      executable: inspector
      trigger: [config, show]
      native_command: true
      deployed_command: true
      argv: [config, show]
    project_list:
      executable: inspector
      trigger: [project, list]
      native_command: true
      deployed_command: true
      argv: [project, list]
    project_show:
      executable: inspector
      trigger: [project, show]
      native_command: true
      deployed_command: true
      argv: [project, show]
    version:
      executable: inspector
      trigger: [version]
      native_command: true
      deployed_command: true
      argv: [version]
  workload:
    command: serve
    endpoints:
      http:
        scheme: http
        port: 8076
        readiness:
          path: /_health_
    runtime:
      before_start:
        - actions:
            - environment: [config, check]
      after_start:
        - requires:
            endpoints: [http]
          actions:
            - environment: [config, check, --live]
  install:
    target:
      default_path: "{{ reploy.install_root }}/{{ environment.id }}"
    success:
      lines:
        - "inspector url: {{ environment.workload.endpoints.http.scheme }}://{{ reploy.workload.endpoints.http.publish.address }}:{{ reploy.workload.endpoints.http.publish.port }}"

docker:
  image: python:3.11-slim
  mounts:
    config:
      extends: environment.paths.config
      mode: managed-bind
      source: conf
    data:
      extends: environment.paths.data
      mode: managed-bind
      source: data
  workload:
    endpoints:
      http:
        extends: environment.workload.endpoints.http
        bind:
          address: 0.0.0.0
        publish:
          address: 127.0.0.1
          staging: 18076
          deployed: 19076
