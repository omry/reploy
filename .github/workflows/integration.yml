name: Integration

on:
  workflow_dispatch:
    inputs:
      macos_runner:
        description: GitHub-hosted macOS runner for Docker integration.
        type: string
        default: macos-15-intel
  workflow_call:
    inputs:
      macos_runner:
        description: GitHub-hosted macOS runner for Docker integration.
        type: string
        default: macos-15-intel

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cli-integration:
    name: CLI runtime integration (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux amd64
            runner: ubuntu-latest
            persistent_install: true
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            persistent_install: true
          - name: macOS amd64
            runner: ${{ inputs.macos_runner || 'macos-15-intel' }}
            persistent_install: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install maintainer tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox

      - name: Install Docker runtime on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install docker docker-compose colima
          mkdir -p ~/.docker/cli-plugins
          ln -sf "$(brew --prefix docker-compose)/bin/docker-compose" ~/.docker/cli-plugins/docker-compose
          sw_vers
          uname -a
          sysctl -n kern.hv_support || true
          colima version
          limactl --version
          colima start --runtime docker --vm-type vz --mount-type virtiofs --cpu 2 --memory 4 --disk 20
          colima status
          docker info
          docker compose version
          docker run --rm -v "$PWD:/workspace:ro" alpine:3.22 test -f /workspace/go.mod

      - name: Run CLI runtime integration
        if: ${{ matrix.persistent_install == false }}
        env:
          NO_UPDATE_NOTIFIER: "1"
          TMPDIR: ${{ runner.temp }}/
        run: nox -s cli-integration

      - name: Run CLI runtime and persistent install integration
        if: ${{ matrix.persistent_install == true }}
        env:
          NO_UPDATE_NOTIFIER: "1"
          TMPDIR: ${{ runner.temp }}/
        run: nox -s cli-integration -- --persistent-install

      - name: Dump macOS Docker runtime logs
        if: failure() && runner.os == 'macOS'
        run: |
          find ~/.colima -maxdepth 5 -type f -name "*.log" -print -exec tail -n 200 {} \; || true
          find ~/.lima -maxdepth 5 -type f -name "*.log" -print -exec tail -n 200 {} \; || true

      - name: Stop macOS Docker runtime
        if: always() && runner.os == 'macOS'
        run: colima delete --force || true
