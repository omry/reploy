name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Linux CI checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install maintainer tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox

      - name: Run CI checks
        env:
          NO_UPDATE_NOTIFIER: "1"
        run: nox -s ci

  macos:
    name: macOS host checks (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-amd64
            runner: macos-15-intel
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install maintainer tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox

      - name: Run Go tests
        env:
          NO_UPDATE_NOTIFIER: "1"
        run: nox -s go-test

      - name: Run host CLI plan smoke
        env:
          NO_UPDATE_NOTIFIER: "1"
        run: nox -s cli-smoke -- --cli-only
