name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Linux CI checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install maintainer tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox

      - name: Run CI checks
        env:
          NO_UPDATE_NOTIFIER: "1"
        run: nox -s ci

  target-smoke:
    name: ${{ matrix.job_name }} (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            job_name: Target smoke
            smoke_args: --docker-mode optional
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            job_name: Target smoke
            smoke_args: --docker-mode optional
          - target: darwin-arm64
            runner: macos-15
            job_name: Target smoke
            smoke_args: --docker-mode optional
          - target: darwin-amd64
            runner: macos-15-intel
            job_name: Target smoke
            smoke_args: --docker-mode optional
          - target: windows-amd64
            runner: windows-2025
            job_name: Windows host smoke
            smoke_args: --docker-mode skip
          - target: windows-arm64
            runner: windows-11-arm
            job_name: Windows host smoke
            smoke_args: --docker-mode skip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install maintainer tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox

      - name: Run Go tests
        env:
          NO_UPDATE_NOTIFIER: "1"
        run: nox -s go-test

      - name: Run host smoke
        env:
          NO_UPDATE_NOTIFIER: "1"
        run: nox -s cli-smoke -- ${{ matrix.smoke_args }}
