name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish PyPI and GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip build hatchling editables twine

      - name: Validate release version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$version" ]]; then
            echo "VERSION is empty" >&2
            exit 1
          fi

          tag="v${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub release already exists: $tag" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Git tag already exists: $tag" >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *".dev"* || "$version" == *"a"* || "$version" == *"b"* || "$version" == *"rc"* ]]; then
            prerelease=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Run Go tests
        run: go test ./...

      - name: Build release distributions
        run: tools/build_release_dists --outdir dist-publish --clean --no-isolation

      - name: Run CLI smoke
        run: python tools/e2e_smoke --reploy dist-publish/linux-amd64/reploy

      - name: Stage PyPI distributions
        run: |
          set -euo pipefail
          mkdir -p pypi-dists
          cp dist-publish/*.whl pypi-dists/
          python -m twine check pypi-dists/*

      - name: Stage GitHub Release binaries
        run: |
          set -euo pipefail
          mkdir -p release-assets
          install -m 0755 dist-publish/linux-amd64/reploy release-assets/reploy-linux-amd64
          install -m 0755 dist-publish/linux-arm64/reploy release-assets/reploy-linux-arm64
          cat > release-notes.md <<EOF
          Reploy ${{ steps.release.outputs.version }}

          PyPI:
          - reploy==${{ steps.release.outputs.version }}

          Binaries:
          - reploy-linux-amd64
          - reploy-linux-arm64
          EOF

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dists
          print-hash: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          set -euo pipefail
          args=(
            "$TAG"
            release-assets/reploy-linux-amd64
            release-assets/reploy-linux-arm64
            --target "$GITHUB_SHA"
            --title "Reploy $VERSION"
            --notes-file release-notes.md
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
