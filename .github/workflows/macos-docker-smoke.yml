name: macOS Docker Smoke

on:
  workflow_dispatch:
    inputs:
      runner:
        description: GitHub-hosted macOS runner to probe.
        type: choice
        default: macos-15
        options:
          - macos-15
          - macos-15-intel

permissions:
  contents: read

jobs:
  smoke:
    name: Docker smoke on ${{ inputs.runner }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install maintainer tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox

      - name: Install Docker runtime
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install docker docker-compose colima qemu
          mkdir -p ~/.docker/cli-plugins
          ln -sf "$(brew --prefix docker-compose)/bin/docker-compose" ~/.docker/cli-plugins/docker-compose
          colima start --runtime docker --vm-type qemu --cpu 2 --memory 4 --disk 20
          docker info
          docker compose version

      - name: Run Docker-backed smoke
        env:
          NO_UPDATE_NOTIFIER: "1"
        run: nox -s cli-smoke

      - name: Dump Docker runtime logs
        if: failure()
        run: |
          find ~/.colima -maxdepth 5 -type f -name "*.log" -print -exec tail -n 200 {} \; || true
          find ~/.lima -maxdepth 5 -type f -name "*.log" -print -exec tail -n 200 {} \; || true

      - name: Stop Docker runtime
        if: always()
        run: colima delete --force || true
